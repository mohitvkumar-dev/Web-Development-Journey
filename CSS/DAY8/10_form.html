<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boootstrap CSS</title>
    <link
           href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
           rel="stylesheet" >
           
    <link rel="stylesheet" href="09_grid_system.css">
        
</head>
<body>

    <div class="container">
        <h2>Form Demo</h2>
        <form >

            <div class="row">
                 <div class="mb-3 col-md-6">
                 <label class="form-label" for="Email">Email</label>
                 <input type="text" class="form-control"  placeholder="Email" id="Email">
            </div>
            <div class="mb-3 col-md-6"> 
                    <label class="form-label" for="Passward">Passward</label>
                    <input type="text" class="form-control"  placeholder="Passward" id="Passward">
            </div>
            </div>
            
            <div class="mb-3">
                     
              <label class="form-label" for="Address">Address></label>
              <input type="text" class="form-control-lg"  placeholder="Address" id="Address">
            </div>
           
            <div class="mb-3">
                <select class="form-select">
                    <option selected>Choose your city </option>
                    <option value="1">Pune</option>
                    <option value="2">Banglore</option>
                    <option value="3">Hydrabad</option>
                </select>
            </div>
         <div class="mb-3 form-check">
            <input type="checkbox" id="agreebs" class="form-check-input">
            <label for="agreebs" class="form-check-label">Agree</label>
         </div>

         <div class="mb-3 form-check">
            <input type="radio" id="radiobs" class="form-check-input">
            <label for="radiobs" class="form-check-label">Yes/No</label>
         </div>

         <div class="form-check form-switch mb-3">
           <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
           <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
</div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
